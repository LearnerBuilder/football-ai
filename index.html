<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ AI Football Predictor</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#2e6f57,#4ea699);
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
    font-size:28px;
    color:#ffd60a;
}

.container{
    max-width:400px;
    margin:20px auto;
    padding:20px;
}

.card{
    background:rgba(0,0,0,0.2);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.card h2{
    margin-bottom:15px;
}

input, select{
    width:80%;
    padding:8px;
    margin:6px 0;
    border:none;
    border-radius:8px;
    text-align:center;
}

button{
    background:linear-gradient(90deg,#ffb703,#fb8500);
    border:none;
    padding:12px 25px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    color:#14213d;
}

button:hover{
    opacity:0.9;
}

.result-box{
    background:rgba(0,0,0,0.25);
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>⚽ AI Football Predictor</h1>

<div class="container">

    <!-- HOME TEAM -->
    <div class="card">
        <h2>Home Team</h2>
        <input type="number" id="homeWins" placeholder="Wins (Last 5)" min="0" max="5">
        <input type="number" id="homeDraws" placeholder="Draws (Last 5)" min="0" max="5">
        <input type="number" id="homeLosses" placeholder="Losses (Last 5)" min="0" max="5">
        <input type="number" id="homeGoalsScored" placeholder="Goals Scored">
        <input type="number" id="homeGoalsConceded" placeholder="Goals Conceded">
    </div>

    <!-- AWAY TEAM -->
    <div class="card">
        <h2>Away Team</h2>
        <input type="number" id="awayWins" placeholder="Wins (Last 5)" min="0" max="5">
        <input type="number" id="awayDraws" placeholder="Draws (Last 5)" min="0" max="5">
        <input type="number" id="awayLosses" placeholder="Losses (Last 5)" min="0" max="5">
        <input type="number" id="awayGoalsScored" placeholder="Goals Scored">
        <input type="number" id="awayGoalsConceded" placeholder="Goals Conceded">
    </div>

    <button onclick="predictMatch()">Predict Match</button>

    <!-- RESULTS -->
    <div class="card">
        <div class="result-box" id="matchResult">Match Result:</div>
        <div class="result-box" id="btts">Both Teams To Score:</div>
        <div class="result-box" id="totalGoals">Total Goals:</div>
        <div class="result-box" id="overUnder">Goal Market:</div>
        <div class="result-box" id="correctScore">Predicted Correct Score:</div>
    </div>

</div>

<script>
function predictMatch(){

    let hw = parseInt(document.getElementById("homeWins").value) || 0;
    let hd = parseInt(document.getElementById("homeDraws").value) || 0;
    let hl = parseInt(document.getElementById("homeLosses").value) || 0;
    let hg = parseInt(document.getElementById("homeGoalsScored").value) || 0;
    let hc = parseInt(document.getElementById("homeGoalsConceded").value) || 0;

    let aw = parseInt(document.getElementById("awayWins").value) || 0;
    let ad = parseInt(document.getElementById("awayDraws").value) || 0;
    let al = parseInt(document.getElementById("awayLosses").value) || 0;
    let ag = parseInt(document.getElementById("awayGoalsScored").value) || 0;
    let ac = parseInt(document.getElementById("awayGoalsConceded").value) || 0;

    // Strength calculation
    let homeStrength = (hw*3 + hd) + (hg - hc);
    let awayStrength = (aw*3 + ad) + (ag - ac);

    let result = "";
    let homeScore = 0;
    let awayScore = 0;

    // Decide result first
    if(homeStrength > awayStrength){
        result = "Home Win";
        homeScore = Math.min(3, Math.max(1, Math.round(hg/5)));
        awayScore = Math.min(2, Math.round(ac/10));
        if(homeScore <= awayScore) homeScore = awayScore + 1;
    }
    else if(awayStrength > homeStrength){
        result = "Away Win";
        awayScore = Math.min(3, Math.max(1, Math.round(ag/5)));
        homeScore = Math.min(2, Math.round(hc/10));
        if(awayScore <= homeScore) awayScore = homeScore + 1;
    }
    else{
        result = "Draw";
        homeScore = awayScore = Math.min(3, Math.round((hg+ag)/10));
    }

    homeScore = Math.min(3, Math.max(0, homeScore));
    awayScore = Math.min(3, Math.max(0, awayScore));

    let totalGoals = homeScore + awayScore;
    let btts = (homeScore>0 && awayScore>0) ? "Yes" : "No";

    let market="";
    if(totalGoals<=0.5) market="Under 0.5";
    else if(totalGoals<=1.5) market="Under 1.5";
    else if(totalGoals<=2.5) market="Under 2.5";
    else market="Over 2.5";

    let diff = Math.abs(homeStrength-awayStrength);
    let confidence = Math.min(95, 55 + diff*5);

    // Output
    document.getElementById("matchResult").innerHTML="Match Result: "+result;
    document.getElementById("btts").innerHTML="Both Teams To Score: "+btts;
    document.getElementById("totalGoals").innerHTML="Total Goals: "+totalGoals;
    document.getElementById("overUnder").innerHTML="Goal Market: "+market;
    document.getElementById("correctScore").innerHTML=
        "Predicted Correct Score: "+homeScore+" - "+awayScore+
        " ("+confidence.toFixed(1)+"%)";
}
</script>

</body>
</html>
