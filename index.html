<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Predictor</title>
<style>
  body { font-family: Arial; background: #f0f0f0; display: flex; justify-content: center; padding: 20px; }
  .container { background: #fff; padding: 20px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
  h2 { text-align: center; margin-bottom: 20px; }
  label { display: block; margin-top: 10px; }
  input { width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; }
  button { margin-top: 20px; width: 100%; padding: 10px; background: #007BFF; color: white; border: none; border-radius: 7px; font-size: 16px; cursor: pointer; }
  button:hover { background: #0056b3; }
  .result { margin-top: 20px; font-weight: bold; text-align: center; font-size: 18px; }
</style>
</head>
<body>
<div class="container">
  <h2>Football Predictor</h2>
  
  <label>Home Wins:</label>
  <input type="number" id="homeWins" min="0" value="0">
  <label>Home Draws:</label>
  <input type="number" id="homeDraws" min="0" value="0">
  <label>Home Losses:</label>
  <input type="number" id="homeLosses" min="0" value="0">
  
  <label>Away Wins:</label>
  <input type="number" id="awayWins" min="0" value="0">
  <label>Away Draws:</label>
  <input type="number" id="awayDraws" min="0" value="0">
  <label>Away Losses:</label>
  <input type="number" id="awayLosses" min="0" value="0">
  
  <button onclick="predictMatch()">Predict</button>
  
  <div class="result" id="result"></div>
</div>

<script>
function predictMatch() {
    const homeWins = parseInt(document.getElementById('homeWins').value);
    const homeDraws = parseInt(document.getElementById('homeDraws').value);
    const homeLosses = parseInt(document.getElementById('homeLosses').value);
    const awayWins = parseInt(document.getElementById('awayWins').value);
    const awayDraws = parseInt(document.getElementById('awayDraws').value);
    const awayLosses = parseInt(document.getElementById('awayLosses').value);

    // Simple scoring: total matches considered
    let homeScore = homeWins*3 + homeDraws; 
    let awayScore = awayWins*3 + awayDraws;

    // Scale down to realistic football score (0-5)
    const maxGoals = 5;
    const scale = Math.max(homeScore, awayScore) / maxGoals || 1;
    let homeGoals = Math.round(homeScore / scale);
    let awayGoals = Math.round(awayScore / scale);

    // Ensure winner and outcome match
    if(homeGoals > awayGoals) {
        winner = 'Home Team';
    } else if(awayGoals > homeGoals) {
        winner = 'Away Team';
    } else {
        winner = 'Draw';
    }

    document.getElementById('result').innerHTML = 
        `<p>Match Winner: ${winner}</p>` +
        `<p>Predicted Score: Home ${homeGoals} - Away ${awayGoals}</p>`;
}
</script>
</body>
</html>
