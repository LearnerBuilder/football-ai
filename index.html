<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate AI Football Predictor</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1f1c2c,#928dab);
    color:white;
    text-align:center;
}

.container{
    max-width:450px;
    margin:auto;
    padding:20px;
}

h1{
    color:#00ffe0;
    margin-bottom:10px;
}

.card{
    background:rgba(0,0,0,0.35);
    padding:15px;
    border-radius:15px;
    margin:15px 0;
    box-shadow:0 0 15px rgba(0,0,0,0.6);
}

h3{
    color:#ffcc00;
}

input{
    width:85%;
    padding:10px;
    margin:6px;
    border:none;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    font-size:14px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#00ffe0;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

button:hover{
    background:#00bfa6;
}

.result{
    background:rgba(0,0,0,0.5);
    padding:15px;
    border-radius:15px;
    margin-top:20px;
    font-size:15px;
}
</style>
</head>

<body>

<div class="container">
<h1>⚽ Ultimate AI Predictor</h1>

<div class="card">
<h3>🏠 Home Team (Last 5 Matches)</h3>
<input type="number" id="hw" placeholder="Wins (0-5)" min="0" max="5">
<input type="number" id="hd" placeholder="Draws (0-5)" min="0" max="5">
<input type="number" id="hl" placeholder="Losses (0-5)" min="0" max="5">
<input type="number" id="hgs" placeholder="Goals Scored (Last 5)">
<input type="number" id="hgc" placeholder="Goals Conceded (Last 5)">
</div>

<div class="card">
<h3>🚗 Away Team (Last 5 Matches)</h3>
<input type="number" id="aw" placeholder="Wins (0-5)" min="0" max="5">
<input type="number" id="ad" placeholder="Draws (0-5)" min="0" max="5">
<input type="number" id="al" placeholder="Losses (0-5)" min="0" max="5">
<input type="number" id="ags" placeholder="Goals Scored (Last 5)">
<input type="number" id="agc" placeholder="Goals Conceded (Last 5)">
</div>

<button onclick="predict()">🔮 Predict Match</button>

<div class="result" id="result"></div>

</div>

<script>
function predict(){

// GET VALUES SAFELY
let hw = parseInt(document.getElementById("hw").value) || 0;
let hd = parseInt(document.getElementById("hd").value) || 0;
let hl = parseInt(document.getElementById("hl").value) || 0;
let hgs = parseInt(document.getElementById("hgs").value) || 0;
let hgc = parseInt(document.getElementById("hgc").value) || 0;

let aw = parseInt(document.getElementById("aw").value) || 0;
let ad = parseInt(document.getElementById("ad").value) || 0;
let al = parseInt(document.getElementById("al").value) || 0;
let ags = parseInt(document.getElementById("ags").value) || 0;
let agc = parseInt(document.getElementById("agc").value) || 0;

// VALIDATE LAST 5 TOTAL
if(hw+hd+hl > 5 || aw+ad+al > 5){
    document.getElementById("result").innerHTML =
    "⚠️ Wins + Draws + Losses cannot exceed 5!";
    return;
}

// FORM CALCULATION (MAX = 1)
let homeForm = (hw*3 + hd) / 15;
let awayForm = (aw*3 + ad) / 15;

// ATTACK & DEFENSE AVERAGE
let homeAttack = hgs / 5;
let homeDefense = hgc / 5;
let awayAttack = ags / 5;
let awayDefense = agc / 5;

// SMART EXPECTED GOALS MODEL
let homeExpected = (homeAttack * 0.7) + (awayDefense * 0.3) + (homeForm * 1.2);
let awayExpected = (awayAttack * 0.7) + (homeDefense * 0.3) + (awayForm * 1.0);

// HOME ADVANTAGE BOOST
homeExpected += 0.3;

// LIMIT 0–5 RANGE
homeExpected = Math.min(5, Math.max(0, homeExpected));
awayExpected = Math.min(5, Math.max(0, awayExpected));

// ROUND FOR REALISTIC SCORE
let homeGoals = Math.round(homeExpected);
let awayGoals = Math.round(awayExpected);

let totalGoals = homeGoals + awayGoals;

// DETERMINE RESULT
let resultText;
if(homeGoals > awayGoals){
    resultText = "🏠 HOME WIN";
}
else if(awayGoals > homeGoals){
    resultText = "🚗 AWAY WIN";
}
else{
    resultText = "🤝 DRAW";
}

// OVER / UNDER
function OU(line){
    return totalGoals > line ? "Over " + line : "Under " + line;
}

document.getElementById("result").innerHTML = `
<h3>📊 Prediction Result</h3>
<b>Match Result:</b> ${resultText}<br><br>
<b>Correct Score:</b> ${homeGoals} - ${awayGoals}<br><br>
<b>Total Goals:</b> ${totalGoals}<br><br>
${OU(0.5)}<br>
${OU(1)}<br>
${OU(1.5)}<br>
${OU(2)}<br>
${OU(2.5)}<br>
${OU(3)}<br>
${OU(3.5)}
`;
}
</script>

</body>
</html>
