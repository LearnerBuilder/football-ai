 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ AI Football Predictor</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#2e6f57,#4ea699);
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
    font-size:28px;
    color:#ffd60a;
}

.container{
    max-width:400px;
    margin:20px auto;
    padding:20px;
}

.card{
    background:rgba(0,0,0,0.2);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input{
    width:85%;
    padding:8px;
    margin:6px 0;
    border:none;
    border-radius:8px;
    text-align:center;
}

button{
    background:linear-gradient(90deg,#ffb703,#fb8500);
    border:none;
    padding:12px 25px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    color:#14213d;
}

button:hover{
    opacity:0.9;
}

.result-box{
    background:rgba(0,0,0,0.25);
    padding:12px;
    border-radius:10px;
    margin-top:8px;
}

#results{
    display:none;
}

#analyzing{
    display:none;
    font-size:18px;
    margin-top:15px;
    color:#ffd60a;
}
</style>
</head>

<body>

<h1>⚽ AI Football Predictor</h1>

<div class="container">

    <!-- HOME TEAM -->
    <div class="card">
        <h2>Home Team</h2>
        <input type="number" id="homeWins" placeholder="Wins (Last 5)" min="0" max="5">
        <input type="number" id="homeDraws" placeholder="Draws (Last 5)" min="0" max="5">
        <input type="number" id="homeLosses" placeholder="Losses (Last 5)" min="0" max="5">

        <input type="number" id="homeLast5Scored" placeholder="Goals Scored (Last 5 Matches)">
        <input type="number" id="homeLast5Conceded" placeholder="Goals Conceded (Last 5 Matches)">
    </div>

    <!-- AWAY TEAM -->
    <div class="card">
        <h2>Away Team</h2>
        <input type="number" id="awayWins" placeholder="Wins (Last 5)" min="0" max="5">
        <input type="number" id="awayDraws" placeholder="Draws (Last 5)" min="0" max="5">
        <input type="number" id="awayLosses" placeholder="Losses (Last 5)" min="0" max="5">

        <input type="number" id="awayLast5Scored" placeholder="Goals Scored (Last 5 Matches)">
        <input type="number" id="awayLast5Conceded" placeholder="Goals Conceded (Last 5 Matches)">
    </div>

    <button onclick="startPrediction()">Predict Match</button>

    <div id="analyzing">🔍 Analyzing Match...</div>

    <!-- RESULTS -->
    <div class="card" id="results">
        <div class="result-box" id="btts"></div>
        <div class="result-box" id="totalGoals"></div>
        <div class="result-box" id="overUnder"></div>
        <div class="result-box" id="correctScore"></div>
    </div>

</div>

<script>

function startPrediction(){
    document.getElementById("results").style.display="none";
    document.getElementById("analyzing").style.display="block";

    // Random analyzing time between 3–5 sec
    let delay = 3000 + Math.random()*2000;

    setTimeout(predictMatch, delay);
}

function predictMatch(){

    let hw = parseInt(homeWins.value)||0;
    let hd = parseInt(homeDraws.value)||0;
    let hl = parseInt(homeLosses.value)||0;
    let hgs = parseInt(homeLast5Scored.value)||0;
    let hgc = parseInt(homeLast5Conceded.value)||0;

    let aw = parseInt(awayWins.value)||0;
    let ad = parseInt(awayDraws.value)||0;
    let al = parseInt(awayLosses.value)||0;
    let ags = parseInt(awayLast5Scored.value)||0;
    let agc = parseInt(awayLast5Conceded.value)||0;

    let homeStrength = (hw*3 + hd) + (hgs - hgc);
    let awayStrength = (aw*3 + ad) + (ags - agc);

    let homeScore=0;
    let awayScore=0;

    if(homeStrength > awayStrength){
        homeScore = Math.min(3, Math.max(1, Math.round(hgs/5)));
        awayScore = Math.min(2, Math.round(agc/8));
        if(homeScore <= awayScore) homeScore = awayScore+1;
    }
    else if(awayStrength > homeStrength){
        awayScore = Math.min(3, Math.max(1, Math.round(ags/5)));
        homeScore = Math.min(2, Math.round(hgc/8));
        if(awayScore <= homeScore) awayScore = homeScore+1;
    }
    else{
        homeScore = awayScore = Math.min(3, Math.round((hgs+ags)/10));
    }

    homeScore=Math.min(3,Math.max(0,homeScore));
    awayScore=Math.min(3,Math.max(0,awayScore));

    let total = homeScore+awayScore;
    let btts = (homeScore>0 && awayScore>0) ? "Yes" : "No";

    let market="";
    if(total<=0.5) market="Under 0.5";
    else if(total<=1.5) market="Under 1.5";
    else if(total<=2.5) market="Under 2.5";
    else market="Over 2.5";

    let diff=Math.abs(homeStrength-awayStrength);
    let confidence=Math.min(95,60+diff*5);

    document.getElementById("btts").innerHTML="Both Teams To Score: "+btts;
    document.getElementById("totalGoals").innerHTML="Total Goals: "+total;
    document.getElementById("overUnder").innerHTML="Goal Market: "+market;
    document.getElementById("correctScore").innerHTML=
        "Predicted Correct Score: "+homeScore+" - "+awayScore+
        " ("+confidence.toFixed(1)+"%)";

    document.getElementById("analyzing").style.display="none";
    document.getElementById("results").style.display="block";
}

</script>

</body>
</html>
