<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Ultimate Football Predictor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  * { box-sizing: border-box; margin:0; padding:0; font-family: 'Orbitron', sans-serif; }
  body {
    background: linear-gradient(135deg, #ff6ec4, #7873f5);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    color: white;
    padding: 10px;
  }
  h1 {
    font-size: 2.5rem;
    margin: 20px 0;
    text-align: center;
    text-shadow: 2px 2px 8px #000;
  }
  .section {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    margin: 10px 0;
    width: 100%;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
  }
  .section h2 {
    font-size: 1.8rem;
    margin-bottom: 10px;
    text-align: center;
  }
  .input-group {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  label {
    flex: 1 1 45%;
    font-size: 1.2rem;
    margin-bottom: 5px;
  }
  select, input[type=number] {
    flex: 1 1 45%;
    padding: 10px;
    font-size: 1.2rem;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
    text-align: center;
  }
  button {
    background: #ffce00;
    color: #000;
    font-size: 1.8rem;
    font-weight: bold;
    padding: 15px 20px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
  }
  button:hover {
    transform: scale(1.05);
    background: #ff9f00;
  }
  .output {
    margin-top: 20px;
    text-align: center;
    font-size: 1.6rem;
    min-height: 100px;
  }
  .loading {
    font-size: 1.6rem;
    color: #ffeb3b;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%,50%,100% {opacity: 1;}
    25%,75% {opacity: 0;}
  }
  .score, .result, .goals {
    margin: 10px 0;
    font-size: 1.8rem;
    font-weight: bold;
  }
</style>
</head>
<body>
<h1>⚽ Ultimate Football Predictor</h1>

<div class="section">
  <h2>Home Team (Last 5)</h2>
  <div class="input-group">
    <label>Wins</label>
    <select id="homeWins">
      <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
    </select>
    <label>Draws</label>
    <select id="homeDraws">
      <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
    </select>
    <label>Losses</label>
    <select id="homeLosses">
      <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
    </select>
    <label>Goals Scored</label>
    <input type="number" id="homeGF" min="0" max="50" value="5">
    <label>Goals Conceded</label>
    <input type="number" id="homeGA" min="0" max="50" value="5">
  </div>
</div>

<div class="section">
  <h2>Away Team (Last 5)</h2>
  <div class="input-group">
    <label>Wins</label>
    <select id="awayWins">
      <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
    </select>
    <label>Draws</label>
    <select id="awayDraws">
      <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
    </select>
    <label>Losses</label>
    <select id="awayLosses">
      <option>0</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
    </select>
    <label>Goals Scored</label>
    <input type="number" id="awayGF" min="0" max="50" value="5">
    <label>Goals Conceded</label>
    <input type="number" id="awayGA" min="0" max="50" value="5">
  </div>
</div>

<button id="predictBtn">🔮 Predict Match</button>

<div class="output" id="output"></div>

<script>
function getRandomInt(max) {
  return Math.floor(Math.random() * (max + 1));
}

function predictMatch() {
  const output = document.getElementById('output');
  output.innerHTML = '<div class="loading">Analyzing match...</div>';

  setTimeout(() => {
    // Read inputs
    const hW = parseInt(document.getElementById('homeWins').value);
    const hD = parseInt(document.getElementById('homeDraws').value);
    const hL = parseInt(document.getElementById('homeLosses').value);
    const hGF = parseInt(document.getElementById('homeGF').value);
    const hGA = parseInt(document.getElementById('homeGA').value);

    const aW = parseInt(document.getElementById('awayWins').value);
    const aD = parseInt(document.getElementById('awayDraws').value);
    const aL = parseInt(document.getElementById('awayLosses').value);
    const aGF = parseInt(document.getElementById('awayGF').value);
    const aGA = parseInt(document.getElementById('awayGA').value);

    // Simple scoring formula
    let homeScore = Math.round((hW*3 + hD - hL + hGF - hGA + getRandomInt(2))/3);
    let awayScore = Math.round((aW*3 + aD - aL + aGF - aGA + getRandomInt(2))/3);

    // Cap scores 0-5
    homeScore = Math.min(Math.max(homeScore,0),5);
    awayScore = Math.min(Math.max(awayScore,0),5);

    // Winner / Draw
    let result = '';
    if(homeScore > awayScore) result = '🏠 Home Team Wins!';
    else if(awayScore > homeScore) result = '✈️ Away Team Wins!';
    else result = '🤝 Draw Match!';

    // Correct Score possibilities
    const possibleScores = [];
    for(let i=0;i<=5;i++){
      for(let j=0;j<=5;j++){
        if(i===homeScore && j===awayScore) possibleScores.push(`${i}-${j}`);
      }
    }

    // Total goals
    const totalGoals = homeScore + awayScore;
    const overUnder = ['0.5','1','1.5','2','2.5'].map(n => {
      return `Over ${n}: ${totalGoals>parseFloat(n)?'✅':'❌'}, Under ${n}: ${totalGoals<parseFloat(n)?'✅':'❌'}`;
    }).join('<br>');

    output.innerHTML = `
      <div class="result">${result}</div>
      <div class="score">Correct Score: ${possibleScores.join(', ')}</div>
      <div class="goals">Total Goals: ${totalGoals}<br>${overUnder}</div>
    `;
  }, 3000 + Math.random()*2000); // 3-5 sec delay
}

document.getElementById('predictBtn').addEventListener('click', predictMatch);
</script>
</body>
</html>
