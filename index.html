<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ AI Football Predictor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 60px;
    }

    button {
      padding: 10px 20px;
      margin-top: 15px;
      cursor: pointer;
    }

    #result {
      margin-top: 25px;
      font-size: 1.1em;
      font-weight: bold;
      white-space: pre-line;
    }

    .input-row {
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>⚽ AI Football Predictor</h1>
  <p>Enter Home & Away team stats to predict outcome and goals</p>

  <div class="input-row">
    <strong>Home Team:</strong><br>
    Wins: <input type="number" id="homeWins" min="0" value="0">
    Draws: <input type="number" id="homeDraws" min="0" value="0">
    Losses: <input type="number" id="homeLosses" min="0" value="0">
  </div>

  <div class="input-row">
    <strong>Away Team:</strong><br>
    Wins: <input type="number" id="awayWins" min="0" value="0">
    Draws: <input type="number" id="awayDraws" min="0" value="0">
    Losses: <input type="number" id="awayLosses" min="0" value="0">
  </div>

  <button onclick="predictMatch()">Predict ⚽</button>

  <div id="result"></div>

  <script>
    function predictMatch() {
      const homeWins = parseInt(document.getElementById('homeWins').value);
      const homeDraws = parseInt(document.getElementById('homeDraws').value);
      const homeLosses = parseInt(document.getElementById('homeLosses').value);

      const awayWins = parseInt(document.getElementById('awayWins').value);
      const awayDraws = parseInt(document.getElementById('awayDraws').value);
      const awayLosses = parseInt(document.getElementById('awayLosses').value);

      const resultDiv = document.getElementById('result');

      // Validate input
      if ([homeWins, homeDraws, homeLosses, awayWins, awayDraws, awayLosses].some(isNaN)) {
        resultDiv.textContent = "Please enter all values!";
        return;
      }

      // 1️⃣ Predict outcome
      const homeTotal = homeWins + homeDraws + homeLosses;
      const awayTotal = awayWins + awayDraws + awayLosses;

      const homeStrength = (homeWins + 0.5*homeDraws) / homeTotal;
      const awayStrength = (awayWins + 0.5*awayDraws) / awayTotal;

      let outcome = '';
      if (homeStrength > awayStrength + 0.1) {
        outcome = 'Home Win';
      } else if (awayStrength > homeStrength + 0.1) {
        outcome = 'Away Win';
      } else {
        outcome = 'Draw';
      }

      // 2️⃣ Predict goals using simple Poisson estimation
      const homeAvgGoals = (homeWins*2 + homeDraws + awayLosses*1) / (homeTotal + awayTotal);
      const awayAvgGoals = (awayWins*2 + awayDraws + homeLosses*1) / (homeTotal + awayTotal);
      const totalGoals = homeAvgGoals + awayAvgGoals;

      // 3️⃣ Over/Under calculations
      const thresholds = [0.5,1,1.5,2,2.5,3,3.5];
      let ouText = 'Goals probabilities (approx.):\n';
      thresholds.forEach(th => {
        const over = Math.min(1, Math.max(0, totalGoals / (th+0.1)));
        const under = 1 - over;
        ouText += `Over ${th}: ${(over*100).toFixed(1)}% | Under ${th}: ${(under*100).toFixed(1)}%\n`;
      });

      resultDiv.textContent = `Predicted Outcome: ${outcome}\nExpected Total Goals: ${totalGoals.toFixed(2)}\n\n${ouText}`;
    }
  </script>
</body>
</html>
