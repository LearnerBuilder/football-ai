<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ AI Football Predictor</title>
  <style>
    /* ====== CSS ====== */
    body {
      background-color: #121212;
      color: white;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .container {
      width: 90%;
      max-width: 700px;
      padding: 30px;
      background-color: #333;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h1 {
      color: #FF4081;
      font-size: 36px;
      margin-bottom: 20px;
    }

    .team-group {
      margin-bottom: 25px;
      padding: 15px;
      background-color: #424242;
      border-radius: 10px;
      text-align: left;
    }

    h2 {
      color: #FFEB3B;
      font-size: 24px;
      margin-bottom: 10px;
    }

    label {
      font-size: 16px;
      color: #ddd;
      margin-bottom: 5px;
      display: block;
    }

    input[type="number"] {
      width: 70px;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin: 8px 0;
      text-align: center;
      background-color: #222;
      color: white;
    }

    input[type="number"]:focus {
      border: 2px solid #FF4081;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 20px;
      background-color: #FF4081;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #F50057;
    }

    #loader {
      display: none;
      font-size: 18px;
      color: #FFEB3B;
      margin-top: 20px;
    }

    #result {
      margin-top: 30px;
      padding: 20px;
      background-color: #263238;
      border-radius: 10px;
      font-size: 18px;
      color: #FFEB3B;
      text-align: left;
    }

    #result p {
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚽ AI Football Predictor</h1>

    <!-- HOME INPUTS -->
    <div class="team-group">
      <h2>Home Team (Last 5)</h2>
      <label>Wins:</label><input type="number" id="home-wins" min="0" max="5" required>
      <label>Draws:</label><input type="number" id="home-draws" min="0" max="5" required>
      <label>Losses:</label><input type="number" id="home-losses" min="0" max="5" required>
      <label>Goals Scored:</label><input type="number" id="home-goals" min="0" max="50" required>
      <label>Goals Conceded:</label><input type="number" id="home-conceded" min="0" max="50" required>
    </div>

    <!-- AWAY INPUTS -->
    <div class="team-group">
      <h2>Away Team (Last 5)</h2>
      <label>Wins:</label><input type="number" id="away-wins" min="0" max="5" required>
      <label>Draws:</label><input type="number" id="away-draws" min="0" max="5" required>
      <label>Losses:</label><input type="number" id="away-losses" min="0" max="5" required>
      <label>Goals Scored:</label><input type="number" id="away-goals" min="0" max="50" required>
      <label>Goals Conceded:</label><input type="number" id="away-conceded" min="0" max="50" required>
    </div>

    <button onclick="predictMatch()">⚡ Predict Match</button>

    <div id="loader">🔍 Analyzing match...</div>
    <div id="result"></div>
  </div>

  <script>
    // ====== JS ======
    function predictMatch() {
      document.getElementById('loader').style.display = 'block';
      document.getElementById('result').innerHTML = '';
      setTimeout(() => {
        // Get input values
        let hW = +document.getElementById('home-wins').value;
        let hD = +document.getElementById('home-draws').value;
        let hL = +document.getElementById('home-losses').value;
        let hGS = +document.getElementById('home-goals').value;
        let hGC = +document.getElementById('home-conceded').value;

        let aW = +document.getElementById('away-wins').value;
        let aD = +document.getElementById('away-draws').value;
        let aL = +document.getElementById('away-losses').value;
        let aGS = +document.getElementById('away-goals').value;
        let aGC = +document.getElementById('away-conceded').value;

        // Compute form and strength
        let homeForm = hW*3 + hD;
        let awayForm = aW*3 + aD;
        let homeAgg = hGS - hGC;
        let awayAgg = aGS - aGC;
        let homeStrength = homeForm + homeAgg;
        let awayStrength = awayForm + awayAgg;

        // Determine winner
        let winner;
        if(homeStrength>awayStrength) winner='🏠 Home Team';
        else if(awayStrength>homeStrength) winner='✈️ Away Team';
        else winner='🤝 Draw';

        // Predict score (0-3 logic)
        let homeScore=Math.max(0, Math.round(homeStrength/10 + Math.random()*2));
        let awayScore=Math.max(0, Math.round(awayStrength/10 + Math.random()*2));
        if(winner.includes('Home') && homeScore<=awayScore) homeScore=awayScore+1;
        if(winner.includes('Away') && awayScore<=homeScore) awayScore=homeScore+1;
        if(winner.includes('Draw')) homeScore=awayScore;

        // Limit score combinations to 0-3 goals (No "5-4")
        if(homeScore > 3) homeScore = 3;
        if(awayScore > 3) awayScore = 3;

        // BTTS and over/under
        let btts=(homeScore>0 && awayScore>0)?'Yes':'No';
        let totalGoals=homeScore+awayScore;
        let ou=totalGoals>=3?'Over 2.5 Goals':'Under 2.5 Goals';

        // Show result
        let html=`
          <strong>🏆 Winner:</strong> ${winner}<br>
          <strong>📊 Correct Score:</strong> ${homeScore} - ${awayScore}<br>
          <strong>⚽ Both Teams To Score:</strong> ${btts}<br>
          <strong>📈 Total Goals:</strong> ${ou}<br>
        `;
        document.getElementById('result').innerHTML=html;
        document.getElementById('loader').style.display='none';
      }, 3000);
    }
  </script>
</body>
</html>
