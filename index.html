<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ AI Football Predictor</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    background: rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    max-width:400px;
    margin:auto;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    color:#00ffcc;
}

input{
    width:80%;
    padding:8px;
    margin:5px;
    border:none;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00ffcc;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#00ccaa;
}

.result{
    margin-top:20px;
    background:rgba(0,0,0,0.3);
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>⚽ AI Football Predictor</h1>

<h3>Home Team Stats</h3>
<input type="number" id="homeWins" placeholder="Home Total Wins">
<input type="number" id="homeDraws" placeholder="Home Total Draws">
<input type="number" id="homeLosses" placeholder="Home Total Losses">

<h3>Away Team Stats</h3>
<input type="number" id="awayWins" placeholder="Away Total Wins">
<input type="number" id="awayDraws" placeholder="Away Total Draws">
<input type="number" id="awayLosses" placeholder="Away Total Losses">

<br>
<button onclick="predict()">Predict</button>

<div class="result" id="result"></div>
</div>

<script>
function predict(){

let hw = parseInt(document.getElementById("homeWins").value) || 0;
let hd = parseInt(document.getElementById("homeDraws").value) || 0;
let hl = parseInt(document.getElementById("homeLosses").value) || 0;

let aw = parseInt(document.getElementById("awayWins").value) || 0;
let ad = parseInt(document.getElementById("awayDraws").value) || 0;
let al = parseInt(document.getElementById("awayLosses").value) || 0;

let homeGames = hw + hd + hl;
let awayGames = aw + ad + al;

if(homeGames == 0 || awayGames == 0){
    document.getElementById("result").innerHTML = "⚠️ Please enter valid stats!";
    return;
}

/* SMART STRENGTH CALCULATION */
let homeStrength = (hw*3 + hd*1) / (homeGames*3);
let awayStrength = (aw*3 + ad*1) / (awayGames*3);

/* GOAL EXPECTATION */
let expectedGoals = ((homeStrength + awayStrength) * 3).toFixed(2);

/* MATCH RESULT */
let matchResult;
if(homeStrength > awayStrength + 0.05){
    matchResult = "🏠 HOME WIN";
}
else if(awayStrength > homeStrength + 0.05){
    matchResult = "🚗 AWAY WIN";
}
else{
    matchResult = "🤝 DRAW";
}

/* OVER / UNDER */
function overUnder(line){
    return expectedGoals > line ? "Over " + line : "Under " + line;
}

document.getElementById("result").innerHTML = `
<h3>Prediction Result</h3>
<b>Match Result:</b> ${matchResult}<br><br>
<b>Expected Goals:</b> ${expectedGoals}<br><br>
<b>${overUnder(0.5)}</b><br>
<b>${overUnder(1)}</b><br>
<b>${overUnder(1.5)}</b><br>
<b>${overUnder(2)}</b><br>
<b>${overUnder(2.5)}</b><br>
<b>${overUnder(3)}</b><br>
<b>${overUnder(3.5)}</b>
`;

}
</script>

</body>
</html>
