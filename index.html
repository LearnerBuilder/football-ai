<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Football Predictor</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f7f7f7;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 400px;
  }
  h2 {
    text-align: center;
    margin-bottom: 20px;
  }
  label {
    display: block;
    margin-top: 10px;
  }
  input[type="number"] {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }
  button {
    margin-top: 20px;
    width: 100%;
    padding: 10px;
    background: #007BFF;
    color: white;
    border: none;
    border-radius: 7px;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover {
    background: #0056b3;
  }
  .result {
    margin-top: 20px;
    font-weight: bold;
    text-align: center;
    font-size: 18px;
  }
</style>
</head>
<body>
<div class="container">
  <h2>AI Football Predictor</h2>
  <label>Home Wins:</label>
  <input type="number" id="homeWins" min="0" value="0">
  <label>Home Draws:</label>
  <input type="number" id="homeDraws" min="0" value="0">
  <label>Home Losses:</label>
  <input type="number" id="homeLosses" min="0" value="0">
  
  <label>Away Wins:</label>
  <input type="number" id="awayWins" min="0" value="0">
  <label>Away Draws:</label>
  <input type="number" id="awayDraws" min="0" value="0">
  <label>Away Losses:</label>
  <input type="number" id="awayLosses" min="0" value="0">
  
  <button onclick="predictMatch()">Predict</button>
  
  <div class="result" id="result"></div>
</div>

<script>
function predictMatch() {
    // Get values
    const homeWins = parseInt(document.getElementById('homeWins').value);
    const homeDraws = parseInt(document.getElementById('homeDraws').value);
    const homeLosses = parseInt(document.getElementById('homeLosses').value);
    const awayWins = parseInt(document.getElementById('awayWins').value);
    const awayDraws = parseInt(document.getElementById('awayDraws').value);
    const awayLosses = parseInt(document.getElementById('awayLosses').value);

    // Simple scoring system
    const homeScore = homeWins*3 + homeDraws; 
    const awayScore = awayWins*3 + awayDraws;

    let winner = '';
    let outcome = '';

    if(homeScore > awayScore) {
        winner = 'Home Team';
        outcome = `Predicted Score: Home ${homeScore} - Away ${awayScore}`;
    } else if(awayScore > homeScore) {
        winner = 'Away Team';
        outcome = `Predicted Score: Home ${homeScore} - Away ${awayScore}`;
    } else {
        winner = 'Draw';
        outcome = `Predicted Score: Home ${homeScore} - Away ${awayScore}`;
    }

    document.getElementById('result').innerHTML = `<p>Match Winner: ${winner}</p><p>${outcome}</p>`;
}
</script>
</body>
</html>
