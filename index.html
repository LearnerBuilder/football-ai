<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ AI Football Predictor Pro</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background: linear-gradient(135deg,#ff416c,#ff4b2b);
    color:white;
    text-align:center;
}

.container{
    max-width:420px;
    margin:auto;
    padding:20px;
}

.card{
    background:rgba(0,0,0,0.3);
    padding:15px;
    margin:15px 0;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

h1{
    color:#00ffe7;
}

input{
    width:85%;
    padding:8px;
    margin:5px;
    border:none;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#00ffe7;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#00c7b5;
}

.result{
    background:rgba(0,0,0,0.5);
    padding:15px;
    border-radius:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>⚽ AI Football Predictor Pro</h1>

<div class="card">
<h3>🏠 Home Team (Last 5)</h3>
<input type="number" id="hw" placeholder="Wins (0-5)" min="0" max="5">
<input type="number" id="hd" placeholder="Draws (0-5)" min="0" max="5">
<input type="number" id="hl" placeholder="Losses (0-5)" min="0" max="5">
<input type="number" id="hgs" placeholder="Goals Scored (Last 5)">
<input type="number" id="hgc" placeholder="Goals Conceded (Last 5)">
</div>

<div class="card">
<h3>🚗 Away Team (Last 5)</h3>
<input type="number" id="aw" placeholder="Wins (0-5)" min="0" max="5">
<input type="number" id="ad" placeholder="Draws (0-5)" min="0" max="5">
<input type="number" id="al" placeholder="Losses (0-5)" min="0" max="5">
<input type="number" id="ags" placeholder="Goals Scored (Last 5)">
<input type="number" id="agc" placeholder="Goals Conceded (Last 5)">
</div>

<button onclick="predict()">Predict Match 🔮</button>

<div class="result" id="result"></div>
</div>

<script>
function predict(){

let hw = +hw.value || 0;
let hd = +hd.value || 0;
let hl = +hl.value || 0;
let hgs = +hgs.value || 0;
let hgc = +hgc.value || 0;

let aw = +aw.value || 0;
let ad = +ad.value || 0;
let al = +al.value || 0;
let ags = +ags.value || 0;
let agc = +agc.value || 0;

/* VALIDATION */
if(hw+hd+hl > 5 || aw+ad+al > 5){
    result.innerHTML = "⚠️ Wins+Draws+Losses must not exceed 5!";
    return;
}

/* FORM STRENGTH */
let homeForm = (hw*3 + hd) / 15;
let awayForm = (aw*3 + ad) / 15;

/* ATTACK & DEFENSE */
let homeAttack = hgs / 5;
let homeDefense = hgc / 5;
let awayAttack = ags / 5;
let awayDefense = agc / 5;

/* EXPECTED GOALS CALCULATION */
let homeExpected = (homeAttack * awayDefense + homeForm*2);
let awayExpected = (awayAttack * homeDefense + awayForm*2);

/* LIMIT BETWEEN 0–5 */
homeExpected = Math.min(5, Math.max(0, homeExpected));
awayExpected = Math.min(5, Math.max(0, awayExpected));

let homeGoals = Math.round(homeExpected);
let awayGoals = Math.round(awayExpected);

let totalGoals = homeGoals + awayGoals;

/* MATCH RESULT */
let matchResult;
if(homeGoals > awayGoals){
    matchResult = "🏠 HOME WIN";
}else if(awayGoals > homeGoals){
    matchResult = "🚗 AWAY WIN";
}else{
    matchResult = "🤝 DRAW";
}

/* OVER UNDER FUNCTION */
function overUnder(line){
    return totalGoals > line ? "Over " + line : "Under " + line;
}

result.innerHTML = `
<h3>📊 Prediction Result</h3>
<b>Match Result:</b> ${matchResult}<br><br>
<b>Correct Score:</b> ${homeGoals} - ${awayGoals}<br><br>
<b>Total Goals:</b> ${totalGoals}<br><br>
${overUnder(0.5)}<br>
${overUnder(1)}<br>
${overUnder(1.5)}<br>
${overUnder(2)}<br>
${overUnder(2.5)}<br>
${overUnder(3)}<br>
${overUnder(3.5)}
`;

}
</script>

</body>
</html>
