<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football AI Predictor</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #1e3c72, #2a5298);
        color: #fff;
        text-align: center;
        padding: 20px;
    }
    h1 {
        color: #ffdd00;
        margin-bottom: 20px;
    }
    .team-input {
        background: rgba(255,255,255,0.1);
        padding: 20px;
        border-radius: 10px;
        margin: 10px auto;
        max-width: 400px;
    }
    label {
        display: block;
        margin-top: 10px;
    }
    select, input[type=number] {
        padding: 5px;
        margin: 5px 0;
        width: 60px;
        border-radius: 5px;
        border: none;
        text-align: center;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #ffdd00;
        color: #1e3c72;
        font-weight: bold;
    }
    #result {
        margin-top: 30px;
        padding: 20px;
        background: rgba(0,0,0,0.2);
        border-radius: 10px;
    }
    .score-row {
        display: flex;
        justify-content: space-between;
        padding: 5px 10px;
        margin: 3px 0;
        border-radius: 5px;
    }
    .home-win { background-color: #4caf50; }
    .draw { background-color: #ff9800; }
    .away-win { background-color: #f44336; }
</style>
</head>
<body>

<h1>Football AI Predictor</h1>

<div class="team-input">
    <h2>Home Team</h2>
    <label>Wins: <select id="homeWins">` + Array.from({length:6}, (_,i)=>`<option>${i}</option>`).join('') + `</select></label>
    <label>Draws: <select id="homeDraws">` + Array.from({length:6}, (_,i)=>`<option>${i}</option>`).join('') + `</select></label>
    <label>Losses: <select id="homeLosses">` + Array.from({length:6}, (_,i)=>`<option>${i}</option>`).join('') + `</select></label>
    <label>Goals Scored: <input type="number" id="homeGoals" min="0" value="0"></label>
    <label>Goals Conceded: <input type="number" id="homeConceded" min="0" value="0"></label>
</div>

<div class="team-input">
    <h2>Away Team</h2>
    <label>Wins: <select id="awayWins">` + Array.from({length:6}, (_,i)=>`<option>${i}</option>`).join('') + `</select></label>
    <label>Draws: <select id="awayDraws">` + Array.from({length:6}, (_,i)=>`<option>${i}</option>`).join('') + `</select></label>
    <label>Losses: <select id="awayLosses">` + Array.from({length:6}, (_,i)=>`<option>${i}</option>`).join('') + `</select></label>
    <label>Goals Scored: <input type="number" id="awayGoals" min="0" value="0"></label>
    <label>Goals Conceded: <input type="number" id="awayConceded" min="0" value="0"></label>
</div>

<button onclick="predictMatch()">Predict Match</button>

<div id="result"></div>

<script>
function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function predictMatch() {
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = "<h3>Analyzing match...</h3>";
    
    await sleep(3000 + Math.random()*2000); // 3-5 sec delay

    // Get input values
    const homeWins = parseInt(document.getElementById('homeWins').value);
    const homeDraws = parseInt(document.getElementById('homeDraws').value);
    const homeLosses = parseInt(document.getElementById('homeLosses').value);
    const homeGoals = parseInt(document.getElementById('homeGoals').value);
    const homeConceded = parseInt(document.getElementById('homeConceded').value);

    const awayWins = parseInt(document.getElementById('awayWins').value);
    const awayDraws = parseInt(document.getElementById('awayDraws').value);
    const awayLosses = parseInt(document.getElementById('awayLosses').value);
    const awayGoals = parseInt(document.getElementById('awayGoals').value);
    const awayConceded = parseInt(document.getElementById('awayConceded').value);

    // Simple scoring logic
    const homeScoreChance = homeWins*3 + homeGoals - homeConceded;
    const awayScoreChance = awayWins*3 + awayGoals - awayConceded;

    let matchResult = '';
    if(homeScoreChance > awayScoreChance) matchResult = 'Home Win';
    else if(homeScoreChance < awayScoreChance) matchResult = 'Away Win';
    else matchResult = 'Draw';

    // Generate all score combinations 0-3
    let scores = [];
    for(let h=0; h<=3; h++) {
        for(let a=0; a<=3; a++) {
            let prob = Math.max(0.05, 1 - Math.abs(h-a)/4 - Math.abs(homeScoreChance-awayScoreChance)/10); // dummy probability
            scores.push({home:h, away:a, prob: (prob*100).toFixed(1)});
        }
    }

    // Sort by probability descending
    scores.sort((a,b)=>b.prob - a.prob);

    // Build HTML
    let html = `<h2>Predicted Result: <span style="color:#ffdd00;">${matchResult}</span></h2>`;
    html += `<h3>Score Probabilities (0-3 goals)</h3>`;
    scores.forEach(s => {
        let cls = s.home > s.away ? 'home-win' : (s.home < s.away ? 'away-win' : 'draw');
        html += `<div class="score-row ${cls}">${s.home} - ${s.away} : ${s.prob}%</div>`;
    });

    resultDiv.innerHTML = html;
}
</script>

</body>
</html>
